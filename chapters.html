<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spletno branje | Naslov knjige</title>
  <style>
    :root{
      --black:#0a0a0a;
      --dark:#111111;
      --card:#151515;
      --text:#f7f7f7;
      --muted:#cfcfcf;
      --gold:#e8d7a7;
      --border:rgba(232,215,167,.35);
      --glow:0 0 22px rgba(232,215,167,.5);
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Georgia,serif;color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(232,215,167,.06), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,.04), transparent 32%),
        linear-gradient(135deg,var(--black),var(--dark));
      line-height:1.75;min-height:100vh;
    }
    .wrap{max-width:1100px;margin:auto;padding:1rem}
    nav{
      display:flex;justify-content:space-between;align-items:center;gap:.8rem;
      padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.1);
      position:sticky;top:0;backdrop-filter:blur(7px);background:rgba(8,8,8,.65);z-index:10;
      flex-wrap:wrap;
    }
    .brand{color:var(--gold);font-weight:700}
    nav a{color:var(--muted);text-decoration:none;margin-left:.9rem}
    nav a:hover{color:var(--text)}
    .top-controls{display:flex;gap:.5rem;flex-wrap:wrap}
    .mini-btn{
      border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06);
      color:#fff; border-radius:10px; padding:.45rem .7rem; cursor:pointer;
      font-size:.88rem;
    }
    h1{margin:1.2rem 0 .35rem;font-size:clamp(1.6rem,4.2vw,2.2rem)}
    .sub{color:var(--muted);margin:.1rem 0 1rem}

    .layout{display:grid;grid-template-columns:280px 1fr;gap:1rem;margin-top:.8rem;}
    @media (max-width: 920px){ .layout{grid-template-columns:1fr;} }

    .panel,.reader{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;padding:.8rem;transition:.25s;
    }
    .panel:hover,.reader:hover{transform:scale(1.01);box-shadow:var(--glow)}

    .chapter-btn{
      width:100%;text-align:left;cursor:pointer;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);color:var(--text);
      border-radius:10px;padding:.65rem .7rem;margin-bottom:.5rem;
      font-family:inherit;transition:.25s;
    }
    .chapter-btn:hover{transform:scale(1.03);box-shadow:var(--glow)}
    .chapter-btn.active{border-color:var(--gold);background:rgba(232,215,167,.1)}

    .reader h2{margin-top:0;color:var(--gold)}
    .reader hr{border:none;height:1px;background:rgba(232,215,167,.2);margin:1rem 0;}
    .controls{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.9rem;}
    .btn{border:none;cursor:pointer;border-radius:10px;padding:.62rem .95rem;font-weight:700;}
    .btn-home{background:#2e2e2e;color:#fff;text-decoration:none;display:inline-block}
    .btn-audio{background:linear-gradient(90deg,#b89f5b,#e8d7a7,#f6eac2);color:#221c0f}

    .note{color:var(--muted);font-size:.9rem;margin-top:.6rem}
    code{background:rgba(255,255,255,.08);padding:.12rem .36rem;border-radius:6px}

    #toTop{
      position:fixed;right:16px;bottom:16px;z-index:99;
      background:linear-gradient(90deg,#b89f5b,#e8d7a7,#f6eac2);
      color:#221c0f;border:none;border-radius:999px;
      padding:.6rem .9rem;font-weight:700;cursor:pointer;
      box-shadow:var(--glow);display:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="brand">✧ Naslov tvoje knjige</div>
      <div style="display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;">
        <div>
          <a href="./index.html">Domov</a>
          <a href="./chapters.html">Beri spletno</a>
        </div>
        <div class="top-controls">
          <button class="mini-btn" id="ambientToggle">Glasba: Izklop</button>
        </div>
      </div>
    </nav>

    <header>
      <h1>Spletno branje</h1>
      <p class="sub">Izberi poglavje in vstopi v svet zgodbe.</p>
    </header>

    <section class="layout">
      <aside class="panel">
        <strong>Poglavja</strong>
        <div id="chapterList" style="margin-top:.6rem;"></div>
      </aside>

      <article class="reader">
        <h2 id="chapterTitle">Izberi poglavje</h2>
        <div id="chapterBody">
          <p>Dobrodošel v spletnem bralniku. Klikni poglavje za začetek.</p>
        </div>

        <hr />

        <div class="controls">
          <button class="btn btn-audio" id="playChapterAudio">▶ Predvajaj glasbo poglavja</button>
          <a class="btn btn-home" href="./index.html">← Nazaj na glavno stran</a>
        </div>

        <p class="note" id="audioNote">
          Namig: Naloži glasbo poglavja kot <code>audio/ch1.mp3</code>, <code>audio/ch2.mp3</code>, <code>audio/ch3.mp3</code>.
        </p>
      </article>
    </section>
  </div>

  <button id="toTop">▲</button>

  <script>
    const chapters = [
      { id: "ch1", title: "1. poglavje — Šepet pred zoro", audio: "audio/ch1.mp3",
        body: `<p>Noč ni bila tiha — poslušala je.</p>
<p>Stal je pod nebom, raztrganim od zvezd, in v miru je začutil bližino Prisotnosti.</p>
<p>Ne strah. Ne grom. Le tih klic k veri.</p>`
      },
      { id: "ch2", title: "2. poglavje — Skozi ozka vrata", audio: "audio/ch2.mp3",
        body: `<p>Pot je bila ozka kot obljuba in svetla kot usmiljenje.</p>
<p>Vsak korak je zahteval predanost. Vsak vdih je zahteval zaupanje.</p>
<p>Hodil je naprej — ne zato, ker bi razumel, ampak ker je veroval.</p>`
      },
      { id: "ch3", title: "3. poglavje — Svetilke v onstranstvu", audio: "audio/ch3.mp3",
        body: `<p>Onkraj tančice so gorele luči v krajih, kamor sonce ne seže.</p>
<p>Vsaka svetilka je označevala življenje, ki je izbralo upanje namesto obupa.</p>
<p>Zajokal je, se nasmehnil in šel naprej.</p>`
      }
    ];

    const chapterList = document.getElementById("chapterList");
    const chapterTitle = document.getElementById("chapterTitle");
    const chapterBody = document.getElementById("chapterBody");
    const playBtn = document.getElementById("playChapterAudio");
    const audioNote = document.getElementById("audioNote");

    let activeChapter = null;
    let chapterAudio = null;

    function renderChapterButtons(){
      chapterList.innerHTML = chapters.map(c => `
        <button class="chapter-btn ${activeChapter && activeChapter.id === c.id ? "active" : ""}" data-id="${c.id}">
          ${c.title}
        </button>
      `).join("");

      document.querySelectorAll(".chapter-btn").forEach(btn => {
        btn.addEventListener("click", () => showChapter(btn.dataset.id, true));
      });
    }

    function showChapter(id, stopMusic = true){
      const ch = chapters.find(x => x.id === id);
      if (!ch) return;
      activeChapter = ch;

      chapterTitle.textContent = ch.title;
      chapterBody.innerHTML = ch.body;
      audioNote.innerHTML = `Glasbena datoteka: <code>${ch.audio}</code>`;

      if (stopMusic) stopChapterAudio();
      playBtn.textContent = chapterAudio ? "⏸ Ustavi glasbo poglavja" : "▶ Predvajaj glasbo poglavja";

      renderChapterButtons();
    }

    function stopChapterAudio(){
      if (chapterAudio){
        chapterAudio.pause();
        chapterAudio.currentTime = 0;
        chapterAudio = null;
      }
    }

    playBtn.addEventListener("click", async () => {
      if (!activeChapter) return;

      if (chapterAudio){
        stopChapterAudio();
        playBtn.textContent = "▶ Predvajaj glasbo poglavja";
        return;
      }

      try{
        chapterAudio = new Audio(activeChapter.audio);
        await chapterAudio.play();
        playBtn.textContent = "⏸ Ustavi glasbo poglavja";
        chapterAudio.onended = () => {
          chapterAudio = null;
          playBtn.textContent = "▶ Predvajaj glasbo poglavja";
        };
      } catch(e){
        alert("Glasbe poglavja ni mogoče predvajati. Preveri datoteko: " + activeChapter.audio);
        chapterAudio = null;
        playBtn.textContent = "▶ Predvajaj glasbo poglavja";
      }
    });

    // Ambient
    const ambientBtn = document.getElementById("ambientToggle");
    const ambientAudio = new Audio("audio/ambient.mp3");
    ambientAudio.loop = true;
    ambientAudio.volume = 0.35;
    let ambientOn = false;

    ambientBtn.addEventListener("click", async () => {
      if (!ambientOn) {
        try {
          await ambientAudio.play();
          ambientOn = true;
          ambientBtn.textContent = "Glasba: Vklop";
        } catch {
          alert("Glasbe ni bilo mogoče predvajati. Preveri datoteko: audio/ambient.mp3");
        }
      } else {
        ambientAudio.pause();
        ambientOn = false;
        ambientBtn.textContent = "Glasba: Izklop";
      }
    });

    // Scroll to top
    const toTop = document.getElementById("toTop");
    window.addEventListener("scroll", () => {
      toTop.style.display = window.scrollY > 300 ? "block" : "none";
    });
    toTop.addEventListener("click", () => window.scrollTo({top:0, behavior:"smooth"}));

    // Init
    renderChapterButtons();
    showChapter("ch1", false);
  </script>
</body>
</html>
