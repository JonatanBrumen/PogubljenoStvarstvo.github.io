<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misli | Naslov knjige</title>
  <style>
    :root{
      --black:#0a0a0a;--dark:#111111;--card:#151515;
      --text:#f7f7f7;--muted:#d8d8d8;--gold:#e8d7a7;
      --border:rgba(232,215,167,.30);--glow:0 0 18px rgba(232,215,167,.35);
      --soft:0 0 18px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Georgia,serif;color:var(--text);background:#0a0a0a;min-height:100vh;position:relative;overflow-x:hidden;}
    body::before, body::after{
      content:"";position:fixed; inset:-30%;z-index:-2;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.30), transparent 35%),
        radial-gradient(circle at 80% 15%, rgba(232,215,167,.30), transparent 35%),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,.26), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(232,215,167,.28), transparent 45%),
        linear-gradient(135deg, #0b0b0b, #222, #111);
      animation: drift 10s ease-in-out infinite;
    }
    body::after{z-index:-3;opacity:.9;animation: drift2 14s ease-in-out infinite;filter: blur(26px);}
    @keyframes drift{0%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(-8%,5%,0) scale(1.25)}100%{transform:translate3d(0,0,0) scale(1)}}
    @keyframes drift2{0%{transform:translate3d(0,0,0) scale(1.2)}50%{transform:translate3d(8%,-5%,0) scale(1.3)}100%{transform:translate3d(0,0,0) scale(1.2)}}

    .wrap{max-width:1100px;margin:auto;padding:1rem}
    nav{
      display:flex;justify-content:space-between;align-items:center;gap:.8rem;
      padding:.9rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.1);
      position:sticky;top:0;backdrop-filter:blur(10px);background:rgba(10,10,10,.7);z-index:10;border-radius:10px;
    }
    .brand{color:var(--gold);font-weight:700}
    nav a{color:var(--muted);text-decoration:none;margin-left:.9rem}
    nav a:hover{color:var(--text)}
    .top-controls{display:flex;gap:.5rem;flex-wrap:wrap}
    .mini-btn{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:.45rem .7rem;cursor:pointer;font-size:.88rem;}

    h1{margin:1.2rem 0 .35rem;font-size:clamp(1.6rem,4.2vw,2.2rem)}
    .sub{color:var(--muted);margin:.1rem 0 1rem}

    .layout{display:grid;grid-template-columns:280px 1fr;gap:1rem;margin-top:.8rem;}
    @media (max-width: 920px){ .layout{grid-template-columns:1fr;} }

    .panel,.reader{
      background:rgba(20,20,20,.85);border:1px solid var(--border);
      border-radius:14px;padding:.8rem;transition:.25s;box-shadow:var(--soft);
    }
    .panel:hover,.reader:hover{transform:scale(1.01);box-shadow:0 0 18px rgba(232,215,167,.28);}

    .excerpt-btn{
      width:100%;text-align:left;cursor:pointer;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);color:var(--text);
      border-radius:10px;padding:.7rem;margin-bottom:.5rem;
      font-family:inherit;transition:.25s;
    }
    .excerpt-btn:hover{transform:scale(1.03);box-shadow:0 0 18px rgba(232,215,167,.25);}
    .excerpt-btn.active{border-color:var(--gold);background:rgba(232,215,167,.12)}

    .reader h2{margin-top:0;color:var(--gold)}
    .reader hr{border:none;height:1px;background:rgba(232,215,167,.2);margin:1rem 0;}
    .controls{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.9rem;}
    .btn{border:none;cursor:pointer;border-radius:10px;padding:.62rem .95rem;font-weight:700;}
    .btn-audio{background:linear-gradient(90deg,#b89f5b,#e8d7a7,#f6eac2);color:#221c0f}
    .btn-nav{background:rgba(255,255,255,.12);color:#fff}

    .fade-enter{opacity:0;transform:translateY(10px);}
    .fade-enter.active{opacity:1;transform:translateY(0);transition:all .45s ease;}
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="brand">✧ Naslov tvoje knjige</div>
      <div style="display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;">
        <div>
          <a href="index.html#about">O knjigi</a>
          <a href="index.html#read">Branje</a>
          <a href="index.html#thoughts">Misli</a>
          <a href="index.html#characters">Junaki</a>
          <a href="index.html#buy">Nakup</a>
        </div>
        <div class="top-controls">
          <button class="mini-btn" id="ambientToggle">Glasba: Izklop</button>
        </div>
      </div>
    </nav>

    <header>
      <h1>Misli</h1>
      <p class="sub">Posebne misli na levi strani.</p>
    </header>

    <section class="layout">
      <aside class="panel">
        <strong>Misli</strong>
        <div id="excerptList" style="margin-top:.6rem;"></div>
      </aside>

      <article class="reader">
        <h2 id="excerptTitle">Izberi misel</h2>
        <div id="excerptBody"><p>Dobrodošel v mislih. Klikni misel za začetek.</p></div>

        <hr />
        <div class="controls">
          <button class="btn btn-audio" id="playExcerptAudio">▶ Predvajaj glasbo</button>
          <button class="btn btn-nav" id="prevExcerpt">← Prejšnji</button>
          <button class="btn btn-nav" id="nextExcerpt">Naslednji →</button>
        </div>
      </article>
    </section>
  </div>

  <script>
    const excerpts = [
      { id: "th1", title: "Misli I — Tišina", audio: "audio/thought1.mp3", body: `<p>“V tišini pogosto slišiš najbolj resnične stvari.”</p>` },
      { id: "th2", title: "Misli II — Pot", audio: "audio/thought2.mp3", body: `<p>“Pot je daljša, ko pozabiš, zakaj si krenil.”</p>` },
      { id: "th3", title: "Misli III — Upanje", audio: "audio/thought3.mp3", body: `<p>“Upanje ni občutek, je odločitev.”</p>` },
      { id: "th4", title: "Misli IV — Luč", audio: "audio/thought4.mp3", body: `<p>“Tudi majhna luč razbije veliko temo.”</p>` }
    ];

    const excerptList = document.getElementById("excerptList");
    const excerptTitle = document.getElementById("excerptTitle");
    const excerptBody = document.getElementById("excerptBody");
    const playBtn = document.getElementById("playExcerptAudio");
    const prevBtn = document.getElementById("prevExcerpt");
    const nextBtn = document.getElementById("nextExcerpt");

    let activeIndex = 0;
    let excerptAudio = null;

    function renderExcerptButtons(){
      excerptList.innerHTML = excerpts.map((e,i) => `
        <button class="excerpt-btn ${i===activeIndex ? "active" : ""}" data-index="${i}">
          ${e.title}
        </button>
      `).join("");

      document.querySelectorAll(".excerpt-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeIndex = parseInt(btn.dataset.index,10);
          showExcerpt(true);
        });
      });
    }

    function animateSwap(){
      excerptTitle.classList.remove("fade-enter","active");
      excerptBody.classList.remove("fade-enter","active");
      void excerptTitle.offsetWidth; void excerptBody.offsetWidth;
      excerptTitle.classList.add("fade-enter");
      excerptBody.classList.add("fade-enter");
      requestAnimationFrame(()=>{excerptTitle.classList.add("active");excerptBody.classList.add("active");});
    }

    function showExcerpt(stopMusic = true){
      const ex = excerpts[activeIndex];
      excerptTitle.textContent = ex.title;
      excerptBody.innerHTML = ex.body;
      animateSwap();
      if (stopMusic) stopExcerptAudio();
      playBtn.textContent = excerptAudio ? "⏸ Ustavi glasbo" : "▶ Predvajaj glasbo";
      renderExcerptButtons();
    }

    function stopExcerptAudio(){
      if (excerptAudio){excerptAudio.pause();excerptAudio.currentTime = 0;excerptAudio = null;}
    }

    playBtn.addEventListener("click", async () => {
      const ex = excerpts[activeIndex];
      if (!ex) return;
      if (excerptAudio){stopExcerptAudio();playBtn.textContent = "▶ Predvajaj glasbo";return;}
      try{
        excerptAudio = new Audio(ex.audio); await excerptAudio.play();
        playBtn.textContent = "⏸ Ustavi glasbo";
        excerptAudio.onended = () => {excerptAudio = null;playBtn.textContent = "▶ Predvajaj glasbo";};
      } catch { alert("Glasbe ni mogoče predvajati. Preveri datoteko: " + ex.audio); }
    });

    prevBtn.addEventListener("click", () => {activeIndex = (activeIndex - 1 + excerpts.length) % excerpts.length;showExcerpt(true);});
    nextBtn.addEventListener("click", () => {activeIndex = (activeIndex + 1) % excerpts.length;showExcerpt(true);});

    const urlParams = new URLSearchParams(window.location.search);
    const requested = urlParams.get("id");
    if (requested) {
      const idx = excerpts.findIndex(e => e.id === requested);
      if (idx >= 0) activeIndex = idx;
    }

    renderExcerptButtons();
    showExcerpt(false);

    const ambientBtn = document.getElementById("ambientToggle");
    const ambientAudio = new Audio("audio/ambient.mp3");
    ambientAudio.loop = true; ambientAudio.volume = 0.35;
    let ambientOn = false;

    ambientBtn.addEventListener("click", async () => {
      if (!ambientOn) {
        try { await ambientAudio.play(); ambientOn = true; ambientBtn.textContent = "Glasba: Vklop"; }
        catch { alert("Glasbe ni bilo mogoče predvajati. Preveri datoteko: audio/ambient.mp3"); }
      } else {
        ambientAudio.pause(); ambientOn = false; ambientBtn.textContent = "Glasba: Izklop";
      }
    });
  </script>
</body>
</html>
